[profile.default]
src = "src"
out = "out"
libs = ["node_modules"]
solc = "0.8.24"
via_ir = true
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/=node_modules/@openzeppelin/",
    "forge-std/=node_modules/forge-std/",
    "ds-test/=node_modules/forge-std/lib/ds-test/src/"
]

[fuzz]
runs = 10000
